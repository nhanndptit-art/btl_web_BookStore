<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="khung user-select">
    <form action="submit">
      <h1>StoreHau</h1>
      <div class="form-group">
      <label for="username">Username or email <span class="highlight">*</span></label>
      <input type="text" id="username" placeholder="Username" required>

      <label for="password">Password <span class="highlight">*</span></label>
      <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit" class="login-btn">LOGIN</button>
    </form>
    <div class="or">or</div>
    <button class=" login-btn create-account-btn">Create An Account</button>
    <hr class="line">
    <div class="create-account">
      <a href="#">Forgot password?</a>
    </div>
  </div>
</body>
</html>
