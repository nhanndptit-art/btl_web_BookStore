<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store Layout</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="ph ph-book-open"></i>
                <span class="logo-text">BookStore</span>
            </div>
            <nav class="nav">
                <a href="#" class="nav-item active" data-icon="house">
                    <i class="ph-fill ph-house"></i>
                    <span class="nav-text">Home</span>
                </a>
                
                <div class="nav-item search-item" data-icon="magnifying-glass">
                    <i class="ph ph-magnifying-glass"></i>
                    <span class="nav-text">Search</span>
                    <input type="text" class="search-input" placeholder="Tìm kiếm sách, tác giả...">
                </div>
                
                <a href="#" class="nav-item" data-icon="heart">
                    <i class="ph ph-heart"></i>
                    <span class="nav-text">Favorites</span>
                </a>
                
                <a href="#" class="nav-item" data-icon="bell">
                    <i class="ph ph-bell"></i>
                    <span class="nav-text">Notifications</span>
                </a>
            </nav>

            <button class="cart-button">
            <i class="ph ph-shopping-cart"></i>
            <span class="badge">0</span> </button>
        </div>
        <div class="header-container-lower">
            <nav class="main-nav-lower">
                <a href="#" class="nav-item active">Home <i class="ph ph-caret-down"></i></a>
                <a href="#" class="nav-item">Shop <i class="ph ph-caret-down"></i></a>
                <a href="#" class="nav-item">Vendor <i class="ph ph-caret-down"></i></a>
                <a href="#" class="nav-item">Pages <i class="ph ph-caret-down"></i></a>
                <a href="#" class="nav-item">Blog <i class="ph ph-caret-down"></i></a>
                <a href="#" class="nav-item">Contact</a>
            </nav>

    </header>

    <main class="content">
        <h1>Chào mừng bạn đến với Tiệm Sách</h1>
        <p>Đây là khu vực nội dung chính. Bạn sẽ thiết kế banner, các cuốn sách thịnh hành và danh mục ở khu vực này.</p>
        
        <div class="mock-content">
            Khu vực trưng bày sách...
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 BookStore by PTITer</p>
        <ul class ="wraper">
            <li class = "icon facebook">
                <span class="tooltip"></span>
                <span><i class="ph ph-facebook-logo"></i></span>
            </li>
            <li class = "icon github">
                <span class = "tooltip"></span>
                <span><i class="ph ph-github-logo"></i></span>
            </li>
            <li class = "icon instagram">
                <span class = "tooltip"></span>
                <span><i class="ph ph-instagram-logo"></i></span>
            </li>
            <li class = "icon youtube">
                <span class = "tooltip"></span>
                <span><i class="ph ph-youtube-logo"></i></span>
            </li>
            <li class = "icon tiktok">
                <span class = "tooltip"></span>
                <span><i class="ph ph-tiktok-logo"></i></span>
            </li>
        </ul>
    </footer>
</body>
</html>
